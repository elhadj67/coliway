<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coliway - Installation iOS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 20px; padding: 40px; max-width: 400px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .logo { font-size: 60px; margin-bottom: 16px; }
        h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
        p { color: #666; margin-bottom: 24px; font-size: 15px; }
        .btn { display: inline-block; background: #007AFF; color: white; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-size: 17px; font-weight: 600; }
        .btn:active { background: #005EC4; }
        .version { color: #999; font-size: 13px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">📦</div>
        <h1>Coliway</h1>
        <p>Votre application de livraison</p>
        <a class="btn" href="itms-services://?action=download-manifest&url=https://raw.githubusercontent.com/elhadj67/coliway/master/install/manifest.plist">
            Installer sur iPhone
        </a>
        <p class="version">Version 1.0.0 - iOS</p>
    </div>
</body>
</html>
